<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>NashBus — Перевезення UA-EU-MD</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='38' fill='%232563eb'/><text x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Arial' font-weight='bold' font-size='67' fill='white'>NB</text></svg>">
</head>
<body>

<!-- Header -->
<header id="header">
  <div class="header-inner">
    <a href="#" class="logo" onclick="navigate('home')">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 17a2 2 0 002 2h4a2 2 0 002-2M8 17H5a2 2 0 01-2-2V7a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3M8 17v2m8-2v2M3 11h18M7 7h.01M17 7h.01"/></svg>
      NashBus
    </a>
    <div class="header-actions">
      <a href="#" class="btn-driver-panel" onclick="navigate('driver')" data-i18n="nav.driverPanel"></a>
      <a href="#" class="btn-complaints" onclick="navigate('complaints')" data-i18n="nav.complaints"></a>
      <div class="lang-switcher">
        <button onclick="setLang('uk')" data-lang="uk">UA</button>
        <button onclick="setLang('ru')" data-lang="ru">RU</button>
        <button onclick="setLang('ro')" data-lang="ro">RO</button>
      </div>
    </div>
  </div>
</header>

<!-- PAGE: Home -->
<div id="page-home">
  <!-- Hero -->
  <section class="hero">
    <div class="container center">
      <h1 data-i18n="hero.title"></h1>
      <p class="hero-sub" data-i18n="hero.subtitle"></p>
      <div class="hero-buttons">
        <a href="#search" class="btn-white" data-i18n="actions.findTrip"></a>
        <a href="#search" class="btn-ghost" data-i18n="actions.sendParcel"></a>
      </div>
    </div>
  </section>

  <!-- Search -->
  <section id="search" class="search-section">
    <div class="container">
      <form id="search-form" class="search-form" onsubmit="handleSearch(event)">
        <input type="text" id="search-from" data-i18n-placeholder="search.from">
        <input type="text" id="search-to" data-i18n-placeholder="search.to">
        <input type="date" id="search-date">
        <button type="submit" data-i18n="search.submit"></button>
      </form>
      <button id="search-reset" class="search-reset" onclick="resetSearch()" style="display:none">✕</button>
    </div>
  </section>

  <!-- Trips -->
  <section class="trips-section">
    <div class="container">
      <h2 data-i18n="trips.title"></h2>
      <div id="trips-grid" class="trips-grid"></div>
      <p id="no-results" class="no-results" style="display:none" data-i18n="trips.noResults"></p>
    </div>
  </section>

  <!-- Ad -->
  <section class="ad-section">
    <div class="container">
      <div class="ad-card">
        <div class="ad-icon">🛡️</div>
        <div>
          <p class="ad-title" data-i18n="ad.title"></p>
          <p class="ad-text" data-i18n="ad.text"></p>
        </div>
        <a href="#" class="ad-btn" data-i18n="ad.button"></a>
      </div>
    </div>
  </section>
</div>

<!-- PAGE: Driver -->
<div id="page-driver" style="display:none">
  <div class="page-content">
    <div class="container narrow">
      <!-- Auth Form -->
      <div id="auth-section">
        <div id="session-expired-banner" class="warning-banner" style="display:none" data-i18n="auth.sessionExpired"></div>
        <div class="card">
          <h3 data-i18n="auth.title"></h3>
          <p class="subtitle" data-i18n="auth.subtitle"></p>
          <form id="auth-form" onsubmit="handleAuth(event)">
            <input type="text" id="auth-name" data-i18n-placeholder="auth.name" style="display:none">
            <input type="tel" id="auth-phone" data-i18n-placeholder="auth.phone" required>
            <input type="password" id="auth-password" data-i18n-placeholder="auth.password" required>
            <button type="submit" class="btn-primary" id="auth-submit-btn" data-i18n="auth.login"></button>
          </form>
          <p class="auth-toggle">
            <span id="auth-toggle-text" data-i18n="auth.noAccount"></span>
            <a href="#" id="auth-toggle-link" onclick="toggleAuthMode()" data-i18n="auth.register"></a>
          </p>
        </div>
      </div>

      <!-- Driver Panel -->
      <div id="driver-panel" style="display:none">
        <div class="card welcome-card">
          <div class="welcome-info">
            <div class="avatar">
              <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <div>
              <p class="welcome-name"></p>
              <p class="welcome-sub" data-i18n="nav.driverPanel"></p>
            </div>
          </div>
          <button onclick="driverLogout()" class="btn-logout" data-i18n="nav.logout"></button>
        </div>

        <!-- Add Trip -->
        <button onclick="openTripModal()" class="btn-add-trip">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          <span data-i18n="driver.title"></span>
        </button>

        <!-- Clients -->
        <div class="card">
          <div class="card-header">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <h3 data-i18n="clients.title"></h3>
          </div>
          <p class="subtitle" data-i18n="clients.subtitle"></p>
          <form id="client-form" onsubmit="handleSaveClient(event)">
            <div class="autocomplete-wrap">
              <input type="text" id="client-name" data-i18n-placeholder="clients.name" required oninput="onClientNameInput(this.value)">
              <div id="client-suggestions" class="suggestions" style="display:none"></div>
            </div>
            <div class="grid-2">
              <input type="tel" id="client-phone" data-i18n-placeholder="clients.phone" required>
              <input type="text" id="client-address" data-i18n-placeholder="clients.address" required>
            </div>
            <button type="submit" class="btn-primary" data-i18n="clients.save"></button>
          </form>
        </div>
        <div id="clients-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- PAGE: Complaints -->
<div id="page-complaints" style="display:none">
  <div class="page-content">
    <div class="container narrow">
      <div class="card">
        <h3 data-i18n="complaints.title"></h3>
        <p class="subtitle" data-i18n="complaints.subtitle"></p>
        <form id="complaints-form" onsubmit="handleComplaint(event)">
          <input type="text" id="complaint-name" data-i18n-placeholder="complaints.name" required>
          <input type="email" id="complaint-email" data-i18n-placeholder="complaints.email">
          <select id="complaint-type">
            <option value="review" data-i18n="complaints.typeReview"></option>
            <option value="complaint" data-i18n="complaints.typeComplaint"></option>
            <option value="idea" data-i18n="complaints.typeIdea"></option>
          </select>
          <input type="text" id="complaint-route" data-i18n-placeholder="complaints.route">
          <textarea id="complaint-message" rows="4" data-i18n-placeholder="complaints.message" required></textarea>
          <button type="submit" class="btn-primary" data-i18n="complaints.submit"></button>
        </form>
      </div>
      <div id="complaints-history"></div>
    </div>
  </div>
</div>

<!-- MODAL: Add Trip -->
<div id="modal-trip" class="modal" style="display:none">
  <div class="modal-backdrop" onclick="closeTripModal()"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3 data-i18n="driver.title"></h3>
      <button onclick="closeTripModal()" class="modal-close">✕</button>
    </div>
    <p class="subtitle" data-i18n="driver.subtitle"></p>
    <form id="trip-form" onsubmit="handleAddTrip(event)">
      <div class="grid-2">
        <input type="text" id="trip-from" data-i18n-placeholder="driver.from" required>
        <input type="text" id="trip-to" data-i18n-placeholder="driver.to" required>
      </div>
      <div id="waypoints-list"></div>
      <button type="button" onclick="addWaypoint()" class="btn-dashed">
        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        <span data-i18n="driver.addWaypoint"></span>
      </button>
      <div class="grid-3">
        <input type="date" id="trip-date" required>
        <input type="number" id="trip-price" data-i18n-placeholder="driver.price" min="1" required>
        <input type="text" id="trip-bus" data-i18n-placeholder="clients.busNumber">
      </div>
      <input type="number" id="trip-seats" data-i18n-placeholder="driver.seats" min="1" max="60" required>
      <input type="tel" id="trip-phone" data-i18n-placeholder="driver.phone" required>
      <button type="submit" class="btn-yellow" data-i18n="driver.submit"></button>
    </form>
  </div>
</div>

<!-- MODAL: Receipt -->
<div id="modal-receipt" class="modal" style="display:none">
  <div class="modal-backdrop" onclick="closeReceiptModal()"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3 data-i18n="clients.generateReceipt"></h3>
      <button onclick="closeReceiptModal()" class="modal-close">✕</button>
    </div>
    <div id="receipt-client-info" class="receipt-info"></div>
    <div class="grid-2">
      <select id="receipt-from"><option value="" data-i18n="clients.routeFrom"></option></select>
      <select id="receipt-to"><option value="" data-i18n="clients.routeTo"></option></select>
    </div>
    <div class="grid-2">
      <input type="date" id="receipt-date">
      <input type="text" id="receipt-bus" data-i18n-placeholder="clients.busNumber">
    </div>
    <p class="via-label" data-i18n="clients.via"></p>
    <div class="grid-2">
      <button onclick="sendReceipt('whatsapp')" class="btn-wa">WhatsApp</button>
      <button onclick="sendReceipt('viber')" class="btn-viber">Viber</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
