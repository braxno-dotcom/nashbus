<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>NashBus — Админ-панель</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .admin-header { background: #1e293b; }
    .admin-body { padding: 48px 16px 32px; }
    .admin-title { font-size: 14px; font-weight: 700; color: #1f2937; margin-bottom: 4px; }
    .admin-sub { font-size: 10px; color: #9ca3af; margin-bottom: 16px; }
    .trip-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    .trip-table th { background: #f1f5f9; font-size: 10px; font-weight: 600; color: #64748b; padding: 6px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    .trip-table td { font-size: 11px; padding: 8px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    .trip-table tr:hover td { background: #f8fafc; }
    .wp-tags { display: flex; flex-wrap: wrap; gap: 2px; }
    .wp-tag { background: #eff6ff; color: #2563eb; font-size: 9px; padding: 1px 4px; border-radius: 3px; }
    .actions-cell { display: flex; gap: 4px; }
    .btn-edit { background: #2563eb; color: #fff; font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 4px; border: none; }
    .btn-edit:hover { background: #1d4ed8; }
    .btn-del { background: #fef2f2; color: #dc2626; font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 4px; border: none; }
    .btn-del:hover { background: #fee2e2; }
    .btn-cancel { background: #f1f5f9; color: #64748b; font-size: 10px; font-weight: 500; padding: 6px 12px; border-radius: 6px; border: none; margin-left: 8px; }
    .btn-cancel:hover { background: #e2e8f0; }
    .form-section { margin-bottom: 16px; }
    .form-section label { display: block; font-size: 10px; font-weight: 600; color: #64748b; margin-bottom: 2px; }
    .wp-input-row { display: flex; gap: 4px; margin-bottom: 4px; }
    .wp-input-row input { flex: 1; }
    .wp-input-row button { flex-shrink: 0; }
    .stat-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .stat-card { flex: 1; background: #fff; border: 1px solid #f3f4f6; border-radius: 8px; padding: 10px; text-align: center; }
    .stat-num { font-size: 20px; font-weight: 700; color: #2563eb; }
    .stat-label { font-size: 10px; color: #9ca3af; }
    .checkbox-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .checkbox-row input[type=checkbox] { width: auto; }
    .checkbox-row label { font-size: 11px; color: #374151; margin: 0; }
    /* Logo upload */
    .logo-upload-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .btn-upload { display: inline-flex; align-items: center; gap: 5px; background: #2563eb; color: #fff; font-size: 10px; font-weight: 600; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: background .2s; }
    .btn-upload:hover { background: #1d4ed8; }
    .btn-upload.uploading { opacity: .5; pointer-events: none; }
    .upload-status { font-size: 10px; color: #9ca3af; }
    .upload-status.ok { color: #16a34a; }
    .upload-status.err { color: #dc2626; }
    .logo-preview { margin-top: 4px; }
    .logo-preview img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; border: 1px solid #e2e8f0; }
    .logo-preview .logo-remove { background: none; border: none; color: #dc2626; font-size: 10px; margin-left: 6px; cursor: pointer; }
    .amenity-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
    .amenity-grid label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #374151; cursor: pointer; }
    .amenity-grid input { width: auto; margin: 0; }
    .amenity-grid i { width: 14px; text-align: center; color: #64748b; font-size: 12px; }
    /* Autocomplete dropdown */
    .ac-wrap { position: relative; }
    .ac-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; max-height: 150px; overflow-y: auto; z-index: 50; display: none; box-shadow: 0 4px 12px rgba(0,0,0,.1); }
    .ac-list.show { display: block; }
    .ac-item { padding: 6px 10px; font-size: 11px; cursor: pointer; }
    .ac-item:hover, .ac-item.active { background: #eff6ff; color: #2563eb; }
    /* Address geocode */
    .addr-row { display: flex; gap: 4px; margin-bottom: 4px; }
    .addr-row input { flex: 1; }
    .btn-geo { flex-shrink: 0; background: #2563eb; color: #fff; font-size: 10px; font-weight: 600; padding: 6px 10px; border-radius: 6px; border: none; white-space: nowrap; }
    .btn-geo:hover { background: #1d4ed8; }
    .btn-geo:disabled { opacity: .5; }
    .geo-status { font-size: 9px; color: #9ca3af; margin-top: 2px; }
    .geo-status.ok { color: #16a34a; }
    .geo-status.err { color: #dc2626; }
    /* Arrival +N days */
    .arrival-row { display: flex; align-items: center; gap: 6px; }
    .arrival-row input[type=time] { flex: 1; }
    .arrival-row select { width: auto; min-width: 70px; font-size: 11px; padding: 6px 4px; }
    /* Passenger modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #fff; border-radius: 12px; padding: 16px; width: 100%; max-width: 420px; margin: 16px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .modal-header h3 { font-size: 13px; font-weight: 700; color: #1f2937; }
    .modal-close { width: 24px; height: 24px; border-radius: 50%; background: #f3f4f6; border: none; color: #6b7280; font-size: 12px; cursor: pointer; }
    .modal-close:hover { background: #e5e7eb; }
    .pax-item { display: flex; align-items: center; justify-content: space-between; background: #f9fafb; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
    .pax-info { flex: 1; min-width: 0; }
    .pax-name { font-size: 12px; font-weight: 600; color: #1f2937; }
    .pax-phone { font-size: 10px; color: #6b7280; }
    .pax-route { font-size: 9px; color: #9ca3af; }
    .pax-seats { font-size: 10px; color: #6b7280; margin-left: 4px; }
    .pax-del { background: none; border: none; color: #d1d5db; cursor: pointer; padding: 4px; }
    .pax-del:hover { color: #dc2626; }
    .pax-form { background: #f9fafb; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
    .pax-form input { width: 100%; padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 11px; margin-bottom: 6px; background: #fff; }
    .pax-form .pax-row { display: grid; grid-template-columns: 1fr 1fr 60px; gap: 6px; }
    .pax-form .pax-row input { margin-bottom: 0; }
    .btn-pax { background: #eab308; color: #1f2937; font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 4px; border: none; white-space: nowrap; }
    .btn-pax:hover { background: #facc15; }
    .seats-summary { font-size: 10px; color: #6b7280; margin-bottom: 8px; }
    .seats-summary strong { color: #1f2937; }
    @media (max-width: 768px) {
      .trip-table, .trip-table thead, .trip-table tbody, .trip-table th, .trip-table td, .trip-table tr { display: block; }
      .trip-table thead { display: none; }
      .trip-table td { padding: 4px 8px; border: none; font-size: 11px; }
      .trip-table td:before { content: attr(data-label); font-weight: 600; color: #64748b; display: inline-block; width: 90px; font-size: 10px; }
      .trip-table tr { border-bottom: 1px solid #e2e8f0; padding: 8px 0; margin-bottom: 8px; }
    }
  </style>
</head>
<body>

  <div class="header-inner">
    <a href="index.html" class="logo">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 17a2 2 0 002 2h4a2 2 0 002-2M8 17H5a2 2 0 01-2-2V7a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3M8 17v2m8-2v2M3 11h18M7 7h.01M17 7h.01"/></svg>
      NashBus
    </a>
    <div class="header-actions">
      <a href="uk/" data-lang-href="{lang}/" style="color:#fff;font-size:10px;padding:4px 8px" data-i18n="backToSite">← На сайт</a>
      <a href="uk/complaints/" data-lang-href="{lang}/complaints/" style="color:#94a3b8;font-size:10px;padding:4px 8px" data-i18n="contactAdmin">Связаться</a>
      <div class="lang-switcher">
        <button onclick="setLang('uk')" data-lang="uk">UA</button>
        <button onclick="setLang('ru')" data-lang="ru">RU</button>
        <button onclick="setLang('ro')" data-lang="ro">RO</button>
      </div>
    </div>
  </div>
</header>

<div class="admin-body">
  <div class="container">
    <div id="dispatcher-bar" style="display:none;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <span style="font-size:11px;font-weight:700;color:#1f2937" id="dispatcher-name"></span>
        <span style="font-size:9px;background:#e9d5ff;color:#7c3aed;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:6px">Диспетчер</span>
        <span style="font-size:9px;color:#6b7280;margin-left:6px" id="dispatcher-company"></span>
      </div>
      <button onclick="dispatcherLogout()" style="font-size:10px;color:#dc2626;font-weight:500;background:none;border:none;cursor:pointer;text-decoration:underline">Выйти</button>
    </div>
    <h1 class="admin-title" data-i18n="title">Управление рейсами</h1>
    <p class="admin-sub" data-i18n="subtitle">Добавляйте, редактируйте и удаляйте рейсы. Изменения мгновенно появятся на главной странице.</p>

    <!-- Stats -->
    <div class="stat-row" id="stats"></div>

    <!-- Add/Edit Form -->
    <div class="card" id="form-card">
      <h3 id="form-title" data-i18n="addTrip">Добавить рейс</h3>
      <p class="subtitle" data-i18n="formHint">Заполните поля и нажмите «Сохранить»</p>
      <form id="admin-trip-form" onsubmit="saveTrip(event)">
        <input type="hidden" id="edit-id" value="">
        <div class="grid-3">
          <div class="form-section" id="driver-select-wrap" style="display:none">
            <label>Водитель</label>
            <select id="f-driver-select" style="padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;font-weight:600;background:#f0e6ff;color:#6b21a8;width:100%" onchange="onDriverSelect()"></select>
          </div>
          <div class="form-section" id="carrier-wrap"><label data-i18n="f.carrier">Перевозчик</label><input type="text" id="f-carrier" placeholder="EuroTrans" required></div>
          <div class="form-section" id="carrier-id-wrap"><label data-i18n="f.carrierId">ID компании</label><input type="text" id="f-carrier-id" placeholder="eurotrans" required></div>
          <div class="form-section"><label data-i18n="f.phone">Телефон</label><input type="tel" id="f-phone" placeholder="+380..." required></div>
        </div>
        <div class="grid-2">
          <div class="form-section ac-wrap"><label data-i18n="f.from">Откуда</label><input type="text" id="f-from" placeholder="paris" required autocomplete="off"><div class="ac-list" id="ac-from"></div></div>
          <div class="form-section ac-wrap"><label data-i18n="f.to">Куда</label><input type="text" id="f-to" placeholder="kyiv" required autocomplete="off"><div class="ac-list" id="ac-to"></div></div>
        </div>
        <div class="form-section ac-wrap">
          <label data-i18n="f.waypoints">Промежуточные остановки (через запятую)</label>
          <input type="text" id="f-waypoints" placeholder="strasbourg, nuremberg, prague, krakow, lviv" autocomplete="off">
          <div class="ac-list" id="ac-wp"></div>
        </div>
        <div class="grid-3">
          <div class="form-section"><label data-i18n="f.date">Дата</label><input type="date" id="f-date" required></div>
          <div class="form-section"><label data-i18n="f.departure">Отправление</label><input type="time" id="f-departure" required></div>
          <div class="form-section">
            <label data-i18n="f.arrival">Прибытие</label>
            <div class="arrival-row">
              <input type="time" id="f-arrival" required>
              <select id="f-plus-days">
                <option value="0">+0</option>
                <option value="1">+1</option>
                <option value="2">+2</option>
                <option value="3">+3</option>
              </select>
            </div>
          </div>
        </div>
        <div class="checkbox-row" style="margin-top:4px">
          <input type="checkbox" id="f-repeat" onchange="document.getElementById('f-repeat-weeks').style.display=this.checked?'':'none';document.getElementById('f-repeat-label').style.display=this.checked?'':'none'">
          <label for="f-repeat" data-i18n="f.repeat">Повторять еженедельно</label>
          <select id="f-repeat-weeks" style="display:none;padding:2px 6px;border:1px solid #e5e7eb;border-radius:4px;font-size:11px;margin-left:4px">
            <option value="2">2</option><option value="3">3</option><option value="4" selected>4</option>
            <option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option>
          </select>
          <span id="f-repeat-label" style="display:none;font-size:10px;color:#6b7280" data-i18n="f.repeatWeeks">нед.</span>
        </div>
        <div class="grid-2">
          <div class="form-section"><label data-i18n="f.duration">В пути</label><input type="text" id="f-duration" placeholder="32h" required></div>
          <div class="form-section"><label data-i18n="f.price">Цена</label><input type="text" id="f-price" placeholder="€95" required></div>
        </div>
        <div class="grid-2">
          <div class="form-section"><label data-i18n="f.seats">Мест</label><input type="number" id="f-seats" placeholder="14" min="1" required></div>
          <div class="form-section"><label data-i18n="f.totalSeats">Всего мест</label><input type="number" id="f-total-seats" placeholder="20" min="1"></div>
        </div>
        <div class="form-section">
          <label data-i18n="f.address">Точка сбора (адрес)</label>
          <div class="addr-row">
            <input type="text" id="f-address" data-i18n-placeholder="f.addressHint" placeholder="Варшава, центральный вокзал">
            <button type="button" class="btn-geo" onclick="geocodeAddress()" data-i18n="f.find">📍 Найти</button>
          </div>
          <div class="geo-status" id="geo-status"></div>
        </div>
        <div class="grid-2">
          <div class="form-section"><label data-i18n="f.lat">Широта</label><input type="text" id="f-lat" placeholder="48.8566" readonly style="background:#f9fafb"></div>
          <div class="form-section"><label data-i18n="f.lng">Долгота</label><input type="text" id="f-lng" placeholder="2.3522" readonly style="background:#f9fafb"></div>
        </div>
        <div class="form-section">
          <label data-i18n="f.logo">Логотип / фото автобуса</label>
          <div class="logo-upload-row">
            <label class="btn-upload" for="f-logo-file"><i class="fas fa-cloud-upload-alt"></i> <span data-i18n="f.chooseLogo">Выбрать файл</span></label>
            <input type="file" id="f-logo-file" accept="image/*" style="display:none" onchange="uploadLogo(this)">
            <span class="upload-status" id="upload-status"></span>
          </div>
          <input type="hidden" id="f-logo" value="">
          <div id="logo-preview" class="logo-preview"></div>
        </div>
        <div class="form-section">
          <label data-i18n="f.amenities">Удобства</label>
          <div class="amenity-grid">
            <label><input type="checkbox" id="f-wifi"><i class="fas fa-wifi"></i> Wi-Fi</label>
            <label><input type="checkbox" id="f-power"><i class="fas fa-plug"></i> <span data-i18n="f.power">Розетки</span></label>
            <label><input type="checkbox" id="f-ac"><i class="fas fa-snowflake"></i> <span data-i18n="f.ac">Кондиционер</span></label>
            <label><input type="checkbox" id="f-toilet"><i class="fas fa-restroom"></i> <span data-i18n="f.toilet">Туалет</span></label>
            <label><input type="checkbox" id="f-luggage"><i class="fas fa-suitcase-rolling"></i> <span data-i18n="f.luggage">Багаж</span></label>
            <label><input type="checkbox" id="f-pets"><i class="fas fa-paw"></i> <span data-i18n="f.pets">Животные</span></label>

        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="f-parcels">

        </div>
        <div style="display:flex;gap:8px">
          <button type="submit" class="btn-primary" data-i18n="f.save">Сохранить</button>
          <button type="button" onclick="cancelEdit()" class="btn-cancel" style="flex:none;padding:8px 16px" data-i18n="f.cancel">Отмена</button>
        </div>
      </form>
    </div>

    <!-- Trips table -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <h3 data-i18n="allTrips">Все рейсы</h3>
        <div style="display:flex;gap:6px">
          <button onclick="openStatsModal()" class="btn-edit" style="font-size:10px">📊 <span data-i18n="statsBtn">Статистика</span></button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="trip-table">
          <thead>
            <tr>
              <th data-i18n="th.carrier">Перевозчик</th>
              <th data-i18n="th.route">Маршрут</th>
              <th data-i18n="th.stops">Остановки</th>
              <th data-i18n="th.date">Дата</th>
              <th data-i18n="th.price">Цена</th>
              <th data-i18n="th.seats">Мест</th>
              <th data-i18n="th.actions">Действия</th>
            </tr>
          </thead>
          <tbody id="trips-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Stats modal -->
<div id="stats-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeStatsModal()">
  <div class="modal-box" style="max-width:360px">
    <div class="modal-header">
      <h3 id="stats-modal-title"></h3>
      <button class="modal-close" onclick="closeStatsModal()">✕</button>
    </div>
    <div id="stats-modal-body" style="text-align:center"></div>
  </div>
</div>

<!-- Passenger modal -->
<div id="pax-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closePaxModal()">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="pax-modal-title"></h3>
      <button class="modal-close" onclick="closePaxModal()">✕</button>
    </div>
    <div id="pax-seats-info" class="seats-summary"></div>
    <div id="pax-form-wrap"></div>
    <div id="pax-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
// ==================== Auth gate ====================
var DISPATCHER_AUTH_KEY = "nashbus_dispatcher_auth";
var dispatcherInfo = null; // { id, name, companyId, driverIds: [] }

function getDispatcherAuth() {
  var saved = localStorage.getItem(DISPATCHER_AUTH_KEY);
  if (!saved) return null;
  try { return JSON.parse(saved); } catch(e) { return null; }
}

function dispatcherLogout() {
  localStorage.removeItem(DISPATCHER_AUTH_KEY);
  location.reload();
}

async function checkDispatcherCode(code) {
  var { data, error } = await sb.from("driver_codes")
    .select("id,code,driver_name,phone,expires_at,role,company_id")
    .eq("code", code)
    .eq("is_active", true)
    .single();

  if (error || !data) return { ok: false, error: "notFound" };
  if (new Date(data.expires_at) < new Date()) return { ok: false, error: "expired" };
  if (data.role !== "dispatcher") return { ok: false, error: "notDispatcher" };
  if (!data.company_id) return { ok: false, error: "noCompany" };

  // Load all company driver IDs
  var { data: drivers } = await sb.from("driver_codes")
    .select("id,driver_name,phone")
    .eq("company_id", data.company_id)
    .eq("is_active", true);

  var driverIds = (drivers || []).filter(function(d) { return d.id !== data.id; }).map(function(d) { return d.id; });
  var driverNames = {};
  var driverPhones = {};
  (drivers || []).forEach(function(d) { driverNames[d.id] = d.driver_name; driverPhones[d.id] = d.phone || ""; });

  return {
    ok: true,
    info: {
      id: data.id,
      name: data.driver_name,
      companyId: data.company_id,
      driverIds: driverIds,
      allIds: (drivers || []).map(function(d) { return d.id; }),
      driverNames: driverNames,
      driverPhones: driverPhones
    }
  };
}

// Try restoring session
dispatcherInfo = getDispatcherAuth();

if (!dispatcherInfo) {
  // Show login overlay
  document.addEventListener("DOMContentLoaded", function() {
    var overlay = document.createElement("div");
    overlay.id = "auth-overlay";
    overlay.style.cssText = "position:fixed;inset:0;z-index:9999;background:#f8fafc;display:flex;align-items:center;justify-content:center";
    overlay.innerHTML = '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;max-width:320px;width:100%;margin:16px;text-align:center">' +
      '<div style="width:40px;height:40px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">' +

      this.disabled = true;
      this.textContent = "...";
      errEl.style.display = "none";

      var result = await checkDispatcherCode(code);
      if (result.ok) {
        dispatcherInfo = result.info;
        if (document.getElementById("auth-remember").checked) {
          localStorage.setItem(DISPATCHER_AUTH_KEY, JSON.stringify(dispatcherInfo));
        } else {
          sessionStorage.setItem(DISPATCHER_AUTH_KEY, JSON.stringify(dispatcherInfo));
        }

        initDispatcherPage();
      } else {
        var msg = "Неверный код";
        if (result.error === "expired") msg = "Код истёк";

  if (!dispatcherInfo) {
    var sess = sessionStorage.getItem(DISPATCHER_AUTH_KEY);
    if (sess) try { dispatcherInfo = JSON.parse(sess); } catch(e) {}
  }
}

function at(key) {
  var keys = key.split(".");
  var val = ADMIN_DICT[currentLang];
  for (var i = 0; i < keys.length; i++) { val = val ? val[keys[i]] : undefined; }
  return val || key;
}

  document.querySelectorAll("[data-lang-href]").forEach(function(el) {
    el.href = el.getAttribute("data-lang-href").replace("{lang}", lang);
  });
}

function applyTranslations() {
  document.querySelectorAll("[data-i18n]").forEach(function(el) {

    el.placeholder = at(el.getAttribute("data-i18n-placeholder"));
  });
  document.querySelectorAll(".lang-switcher button").forEach(function(btn) {
    btn.classList.toggle("active", btn.getAttribute("data-lang") === currentLang);
  });
}

function renderTable() {

      '</tr>';

function renderStats() {
  var total = trips.length;
  var allSeats = trips.reduce(function(s, t) { return s + (t.totalSeats || t.seats || 20); }, 0);
  var allBooked = trips.reduce(function(s, t) { return s + (bookingCounts[t.id] || 0); }, 0);
  var withParcels = trips.filter(function(t) { return t.parcels; }).length;
  document.getElementById("stats").innerHTML =
    '<div class="stat-card"><div class="stat-num">' + total + '</div><div class="stat-label">' + at("stat.trips") + '</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + (allSeats - allBooked) + ' / ' + allSeats + '</div><div class="stat-label">' + at("stat.seats") + ' (' + at("free") + ')</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + withParcels + '</div><div class="stat-label">' + at("stat.parcels") + '</div></div>';
}

// ==================== Date helpers ====================
// DD.MM.YYYY → YYYY-MM-DD
function toIsoDate(dmy) {
  if (!dmy) return "";
  var p = dmy.split(".");
  return p.length === 3 ? p[2] + "-" + p[1] + "-" + p[0] : "";
}
// YYYY-MM-DD → DD.MM.YYYY
function toDmyDate(iso) {
  if (!iso) return "";
  var p = iso.split("-");
  return p.length === 3 ? p[2] + "." + p[1] + "." + p[0] : "";
}
// "14:00+2" → { time: "14:00", days: 2 }
function parseArrival(val) {
  if (!val) return { time: "", days: 0 };
  var m = val.match(/\+(\d+)$/);
  var days = m ? parseInt(m[1]) : 0;
  var time = m ? val.replace("+" + m[1], "") : val;
  return { time: time, days: days };
}

// ==================== Logo upload (Supabase Storage) ====================
async function uploadLogo(input) {
  var file = input.files[0];
  if (!file) return;
  var btn = document.querySelector(".btn-upload");
  var status = document.getElementById("upload-status");
  btn.classList.add("uploading");
  status.className = "upload-status";
  status.textContent = "Загрузка...";

  var ext = file.name.split(".").pop().toLowerCase();
  var fileName = Date.now() + "_" + Math.random().toString(36).substring(2, 8) + "." + ext;

  var { data, error } = await sb.storage.from("logos").upload(fileName, file, {
    cacheControl: "3600",
    upsert: false
  });

  btn.classList.remove("uploading");

  if (error) {
    status.className = "upload-status err";
    status.textContent = "Ошибка: " + error.message;
    return;
  }

  var { data: urlData } = sb.storage.from("logos").getPublicUrl(fileName);
  var url = urlData.publicUrl;
  document.getElementById("f-logo").value = url;
  status.className = "upload-status ok";
  status.textContent = "Загружено!";
  showLogoPreview(url);
  input.value = "";
}

function showLogoPreview(url) {
  var preview = document.getElementById("logo-preview");
  if (!url) { preview.innerHTML = ""; return; }
  preview.innerHTML = '<img src="' + url + '" alt="logo"><button type="button" class="logo-remove" onclick="removeLogo()">✕ ' + at("f.removeLogo") + '</button>';
}

function removeLogo() {
  document.getElementById("f-logo").value = "";
  document.getElementById("logo-preview").innerHTML = "";
  document.getElementById("upload-status").textContent = "";
}

// ==================== Geocoding (Nominatim) ====================
function geocodeAddress() {
  var addr = document.getElementById("f-address").value.trim();
  if (!addr) return;
  var btn = document.querySelector(".btn-geo");
  var status = document.getElementById("geo-status");
  btn.disabled = true;
  status.className = "geo-status";
  status.textContent = "Ищем...";
  fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + encodeURIComponent(addr))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.disabled = false;
      if (data && data.length > 0) {
        document.getElementById("f-lat").value = parseFloat(data[0].lat).toFixed(4);
        document.getElementById("f-lng").value = parseFloat(data[0].lon).toFixed(4);
        status.className = "geo-status ok";
        status.textContent = "✓ " + data[0].display_name.substring(0, 60);
      } else {
        status.className = "geo-status err";
        status.textContent = "Адрес не найден. Попробуйте другой запрос.";
      }
    })
    .catch(function() {
      btn.disabled = false;
      status.className = "geo-status err";
      status.textContent = "Ошибка сети. Попробуйте ещё раз.";
    });
}

// ==================== Autocomplete ====================
function getAllCities() {
  var set = {};
  trips.forEach(function(t) {
    set[t.fromKey] = 1;
    set[t.toKey] = 1;
    (t.waypoints || []).forEach(function(w) { set[w] = 1; });
  });
  return Object.keys(set).sort();
}

function setupAC(inputId, listId, isMulti) {
  var input = document.getElementById(inputId);
  var list = document.getElementById(listId);
  var activeIdx = -1;

  function getQuery() {
    if (!isMulti) return input.value.trim().toLowerCase();
    var parts = input.value.split(",");
    return parts[parts.length - 1].trim().toLowerCase();
  }

  function showSuggestions() {
    var q = getQuery();
    if (q.length < 1) { list.classList.remove("show"); return; }
    var cities = getAllCities().filter(function(c) { return c.toLowerCase().indexOf(q) !== -1; });
    if (cities.length === 0) { list.classList.remove("show"); return; }
    activeIdx = -1;
    list.innerHTML = cities.slice(0, 8).map(function(c, i) {
      return '<div class="ac-item" data-val="' + c + '">' + c + '</div>';
    }).join("");
    list.classList.add("show");
  }

  function pickValue(val) {
    if (isMulti) {
      var parts = input.value.split(",").map(function(s) { return s.trim(); });
      parts[parts.length - 1] = val;
      input.value = parts.join(", ") + ", ";
    } else {
      input.value = val;
    }
    list.classList.remove("show");
    input.focus();
  }

  input.addEventListener("input", showSuggestions);
  input.addEventListener("focus", showSuggestions);

  input.addEventListener("keydown", function(e) {
    var items = list.querySelectorAll(".ac-item");
    if (!list.classList.contains("show") || items.length === 0) return;
    if (e.key === "ArrowDown") { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, items.length - 1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); }
    else if (e.key === "Enter" && activeIdx >= 0) { e.preventDefault(); pickValue(items[activeIdx].getAttribute("data-val")); return; }
    else if (e.key === "Escape") { list.classList.remove("show"); return; }
    items.forEach(function(it, i) { it.classList.toggle("active", i === activeIdx); });
  });

  list.addEventListener("mousedown", function(e) {
    var item = e.target.closest(".ac-item");
    if (item) { e.preventDefault(); pickValue(item.getAttribute("data-val")); }
  });

  document.addEventListener("click", function(e) {
    if (!input.contains(e.target) && !list.contains(e.target)) list.classList.remove("show");
  });
}

async function saveTrip(e) {
  e.preventDefault();
  var editId = document.getElementById("edit-id").value;
  var wpRaw = document.getElementById("f-waypoints").value;
  var waypoints = wpRaw ? wpRaw.split(",").map(function(s) { return s.trim(); }).filter(Boolean) : [];
  var arrTime = document.getElementById("f-arrival").value;
  var plusDays = parseInt(document.getElementById("f-plus-days").value) || 0;
  // Use driver selector if available (dispatcher mode)
  var carrierId, carrierName;
  var driverSel = document.getElementById("f-driver-select");
  if (dispatcherInfo && driverSel && driverSel.options.length > 0 && !document.getElementById("driver-select-wrap").style.display) {
    carrierId = driverSel.value;
    carrierName = driverSel.options[driverSel.selectedIndex].textContent;
  } else {
    carrierId = document.getElementById("f-carrier-id").value.trim().toLowerCase();
    carrierName = document.getElementById("f-carrier").value;
  }
  var trip = {
    carrierId: carrierId,
    carrier: carrierName,
    fromKey: document.getElementById("f-from").value.trim(),
    toKey: document.getElementById("f-to").value.trim(),
    date: toDmyDate(document.getElementById("f-date").value),

    duration: document.getElementById("f-duration").value,
    price: document.getElementById("f-price").value,
    seats: parseInt(document.getElementById("f-seats").value) || 1,
    totalSeats: parseInt(document.getElementById("f-total-seats").value) || parseInt(document.getElementById("f-seats").value) || 20,
    parcels: document.getElementById("f-parcels").checked,
    pickupLat: parseFloat(document.getElementById("f-lat").value) || 0,
    pickupLng: parseFloat(document.getElementById("f-lng").value) || 0,
    phone: document.getElementById("f-phone").value,
    waypoints: waypoints,
    wifi: document.getElementById("f-wifi").checked,
    powerOutlets: document.getElementById("f-power").checked,
    ac: document.getElementById("f-ac").checked,
    toilet: document.getElementById("f-toilet").checked,
    luggage: document.getElementById("f-luggage").checked,
    pets: document.getElementById("f-pets").checked,
    logoUrl: document.getElementById("f-logo").value.trim()
  };
  if (editId) {
    trip.id = editId;
    await sbUpdateTrip(trip);
  } else {
    var repeat = document.getElementById("f-repeat").checked;
    var repeatWeeks = parseInt(document.getElementById("f-repeat-weeks").value) || 4;
    if (repeat && !editId) {
      var isoDate = document.getElementById("f-date").value;
      for (var i = 0; i <= repeatWeeks; i++) {
        var d = new Date(isoDate);
        d.setDate(d.getDate() + 7 * i);
        var copy = Object.assign({}, trip);
        copy.date = toDmyDate(d.toISOString().split("T")[0]);
        await sbInsertTrip(copy);
      }
    } else {
      await sbInsertTrip(trip);
    }
  }
  trips = await sbLoadTripsFiltered();
  bookingCounts = await sbLoadBookingCountsFiltered();
  cancelEdit();
  renderTable();
  document.getElementById("f-repeat").checked = false;
  document.getElementById("f-repeat-weeks").style.display = "none";
  document.getElementById("f-repeat-label").style.display = "none";
}

function editTrip(id) {
  var t = trips.find(function(x) { return x.id === id; });
  if (!t) return;
  var arr = parseArrival(t.arrival);
  document.getElementById("edit-id").value = t.id;
  document.getElementById("f-carrier-id").value = t.carrierId || "";
  document.getElementById("f-carrier").value = t.carrier;
  // Select driver in dropdown if dispatcher
  var driverSel = document.getElementById("f-driver-select");
  if (driverSel && t.carrierId) {
    for (var si = 0; si < driverSel.options.length; si++) {
      if (driverSel.options[si].value === t.carrierId) { driverSel.selectedIndex = si; break; }
    }
  }
  document.getElementById("f-phone").value = t.phone;
  document.getElementById("f-from").value = t.fromKey;
  document.getElementById("f-to").value = t.toKey;
  document.getElementById("f-waypoints").value = (t.waypoints || []).join(", ");
  document.getElementById("f-date").value = toIsoDate(t.date);
  document.getElementById("f-departure").value = t.departure;
  document.getElementById("f-arrival").value = arr.time;
  document.getElementById("f-plus-days").value = arr.days;
  document.getElementById("f-duration").value = t.duration;
  document.getElementById("f-price").value = t.price;
  document.getElementById("f-seats").value = t.seats;
  document.getElementById("f-total-seats").value = t.totalSeats || t.seats || 20;
  document.getElementById("f-parcels").checked = t.parcels;
  document.getElementById("f-lat").value = t.pickupLat || "";
  document.getElementById("f-lng").value = t.pickupLng || "";
  document.getElementById("f-logo").value = t.logoUrl || "";
  showLogoPreview(t.logoUrl || "");
  document.getElementById("upload-status").textContent = "";
  document.getElementById("f-wifi").checked = t.wifi || false;
  document.getElementById("f-power").checked = t.powerOutlets || false;
  document.getElementById("f-ac").checked = t.ac || false;
  document.getElementById("f-toilet").checked = t.toilet || false;
  document.getElementById("f-luggage").checked = t.luggage || false;
  document.getElementById("f-pets").checked = t.pets || false;
  document.getElementById("f-address").value = "";
  document.getElementById("geo-status").textContent = "";
  document.getElementById("form-title").textContent = at("editTripPrefix") + t.carrier;
  document.getElementById("form-card").scrollIntoView({ behavior: "smooth" });
}

async function deleteTrip(id) {
  if (!confirm(at("confirmDelete"))) return;
  await sbDeleteTrip(id);
  trips = await sbLoadTripsFiltered();
  bookingCounts = await sbLoadBookingCountsFiltered();
  renderTable();
}

function cancelEdit() {
  document.getElementById("edit-id").value = "";
  document.getElementById("admin-trip-form").reset();
  document.getElementById("form-title").textContent = at("addTrip");
  document.getElementById("f-address").value = "";
  document.getElementById("geo-status").textContent = "";
  document.getElementById("f-lat").value = "";
  document.getElementById("f-lng").value = "";
  document.getElementById("f-logo").value = "";
  document.getElementById("logo-preview").innerHTML = "";
  document.getElementById("upload-status").textContent = "";
}

// ==================== Stats Modal ====================
var MONTH_NAMES = {
  uk: ["Січень","Лютий","Березень","Квітень","Травень","Червень","Липень","Серпень","Вересень","Жовтень","Листопад","Грудень"],
  ru: ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"],
  ro: ["Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie","Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"]
};

async function openStatsModal() {
  document.getElementById("stats-modal").style.display = "";
  var monthIdx = new Date().getMonth();
  var monthName = (MONTH_NAMES[currentLang] || MONTH_NAMES.ru)[monthIdx];
  document.getElementById("stats-modal-title").textContent = at("statsBtn") + " — " + monthName;
  document.getElementById("stats-modal-body").innerHTML = '<div style="padding:24px"><div style="width:24px;height:24px;border:2px solid #2563eb;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto"></div></div>';

  var now = new Date();
  var year = now.getFullYear();
  var month = String(now.getMonth() + 1).padStart(2, "0");
  var monthStart = year + "-" + month + "-01";
  var nextMonth = now.getMonth() === 11 ? (year + 1) + "-01-01" : year + "-" + String(now.getMonth() + 2).padStart(2, "0") + "-01";

  // Count trips this month
  var monthTrips = trips.filter(function(t) {
    var d = t.date;
    // Handle DD.MM.YYYY format
    if (d && d.indexOf(".") !== -1) d = toIsoDate(d);
    return d >= monthStart && d < nextMonth;
  });

  // Load bookings (filtered for dispatcher)
  var allBookings = [];
  if (dispatcherInfo && dispatcherInfo.allIds && dispatcherInfo.allIds.length > 0) {
    var routeIds = trips.map(function(t) { return t.id; });
    if (routeIds.length > 0) {
      var { data: bData, error } = await sb.from("bookings").select("route_id,seats_count").in("route_id", routeIds);
      allBookings = error ? [] : (bData || []);
    }
  } else {
    var { data: bData2, error: error2 } = await sb.from("bookings").select("route_id,seats_count");
    allBookings = error2 ? [] : (bData2 || []);
  }

  var monthRouteIds = {};
  monthTrips.forEach(function(t) { monthRouteIds[t.id] = true; });

  var paxMonth = 0;
  var paxTotal = 0;
  allBookings.forEach(function(b) {
    var s = b.seats_count || 1;
    paxTotal += s;
    if (monthRouteIds[b.route_id]) paxMonth += s;
  });

  document.getElementById("stats-modal-body").innerHTML =
    '<div style="background:#eff6ff;border-radius:10px;padding:14px;margin-bottom:10px">' +
    '<div style="font-size:28px;font-weight:700;color:#2563eb">' + monthTrips.length + '</div>' +
    '<div style="font-size:10px;color:#3b82f6;font-weight:500">' + at("statsTrips") + '</div></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' +
    '<div style="background:#f0fdf4;border-radius:10px;padding:14px">' +
    '<div style="font-size:28px;font-weight:700;color:#16a34a">' + paxMonth + '</div>' +
    '<div style="font-size:10px;color:#22c55e;font-weight:500">' + at("statsPaxMonth") + '</div></div>' +
    '<div style="background:#faf5ff;border-radius:10px;padding:14px">' +
    '<div style="font-size:28px;font-weight:700;color:#9333ea">' + paxTotal + '</div>' +
    '<div style="font-size:10px;color:#a855f7;font-weight:500">' + at("statsPaxTotal") + '</div></div></div>';
}

function closeStatsModal() {
  document.getElementById("stats-modal").style.display = "none";
}

// ==================== Passenger Modal ====================
var paxRouteId = null;
var paxBookings = [];

async function openPaxModal(routeId) {
  paxRouteId = routeId;
  var trip = trips.find(function(t) { return t.id === routeId; });
  document.getElementById("pax-modal-title").textContent = at("pax.title") + ": " + (trip ? trip.fromKey + " → " + trip.toKey + " (" + trip.date + ")" : "");
  document.getElementById("pax-modal").style.display = "";

  // Show add form
  document.getElementById("pax-form-wrap").innerHTML =
    '<div class="pax-form" id="pax-add-form">' +
    '<input type="text" id="pax-name" placeholder="' + at("pax.name") + '">' +
    '<input type="tel" id="pax-phone" placeholder="' + at("pax.phone") + '">' +
    '<div class="pax-row">' +
    '<input type="text" id="pax-from" placeholder="' + at("pax.from") + '">' +
    '<input type="text" id="pax-to" placeholder="' + at("pax.to") + '">' +
    '<input type="number" id="pax-seats" placeholder="' + at("pax.seats") + '" value="1" min="1" max="10">' +
    '</div>' +
    '<button class="btn-primary" style="width:100%;margin-top:4px;font-size:11px;padding:8px" onclick="addPax()">' + at("pax.save") + '</button>' +
    '</div>';

  // Load bookings
  var { data, error } = await sb.from("bookings").select("*").eq("route_id", routeId).order("created_at");
  paxBookings = error ? [] : (data || []);
  renderPaxList(trip);
}

function closePaxModal() {
  document.getElementById("pax-modal").style.display = "none";
  paxRouteId = null;
  paxBookings = [];
}

function renderPaxList(trip) {
  var total = (trip ? (trip.totalSeats || trip.seats || 20) : 20);
  var booked = paxBookings.reduce(function(s, b) { return s + (b.seats_count || 1); }, 0);
  var free = total - booked;
  var color = free <= 0 ? '#dc2626' : free <= 3 ? '#d97706' : '#16a34a';
  document.getElementById("pax-seats-info").innerHTML =
    at("pax.occupied") + ': <strong>' + booked + '</strong> ' + at("pax.ofTotal") + ' <strong>' + total + '</strong> — ' +
    at("free") + ': <span style="color:' + color + ';font-weight:700">' + free + '</span>';

  var list = document.getElementById("pax-list");
  if (paxBookings.length === 0) {
    list.innerHTML = '<p style="text-align:center;font-size:10px;color:#9ca3af;padding:12px 0">' + at("pax.empty") + '</p>';
    return;
  }
  list.innerHTML = paxBookings.map(function(b, i) {
    return '<div class="pax-item">' +
      '<div class="pax-info">' +
      '<div class="pax-name">' + (i + 1) + '. ' + b.passenger_name + '<span class="pax-seats">' + (b.seats_count > 1 ? 'x' + b.seats_count : '') + '</span></div>' +
      '<div class="pax-phone">' + b.phone + '</div>' +
      (b.pickup_point || b.dropoff_point ? '<div class="pax-route">' + (b.pickup_point || '') + ' → ' + (b.dropoff_point || '') + '</div>' : '') +
      '</div>' +
      '<button class="pax-del" onclick="deletePax(\'' + b.id + '\')" title="Delete">✕</button>' +
      '</div>';
  }).join("") +
  '<div style="display:flex;gap:6px;margin-top:8px">' +
    '<button onclick="copyPaxList()" id="btn-copy-pax" style="flex:1;font-size:10px;font-weight:600;padding:6px 10px;border-radius:6px;border:1px solid #e5e7eb;background:#f9fafb;color:#374151;cursor:pointer">' + at("pax.copyList") + '</button>' +
    '<button onclick="sendPaxWhatsApp()" style="flex:1;font-size:10px;font-weight:600;padding:6px 10px;border-radius:6px;border:none;background:#22c55e;color:#fff;cursor:pointer">' + at("pax.sendWhatsApp") + '</button>' +
  '</div>';
}

function buildPaxText() {
  var trip = trips.find(function(t) { return t.id === paxRouteId; });
  if (!trip || paxBookings.length === 0) return "";
  var total = trip.totalSeats || trip.seats || 20;
  var booked = paxBookings.reduce(function(s, b) { return s + (b.seats_count || 1); }, 0);
  var header = trip.fromKey + " → " + trip.toKey + " (" + trip.date + ")";
  var lines = paxBookings.map(function(b, i) {
    var line = (i + 1) + ". " + b.passenger_name + " | " + b.phone;
    if (b.seats_count > 1) line += " | x" + b.seats_count;
    if (b.pickup_point && b.dropoff_point) line += " | " + b.pickup_point + " → " + b.dropoff_point;
    return line;
  });
  return header + "\n" + lines.join("\n") + "\n" + booked + "/" + total;
}

function copyPaxList() {
  var text = buildPaxText();
  if (!text) return;
  navigator.clipboard.writeText(text);
  var btn = document.getElementById("btn-copy-pax");
  var orig = btn.textContent;
  btn.textContent = at("pax.copied");
  btn.style.background = "#dcfce7";
  btn.style.color = "#16a34a";
  setTimeout(function() { btn.textContent = orig; btn.style.background = "#f9fafb"; btn.style.color = "#374151"; }, 2000);
}

function sendPaxWhatsApp() {
  var text = buildPaxText();
  if (!text) return;
  window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
}

async function addPax() {
  var name = document.getElementById("pax-name").value.trim();
  var phone = document.getElementById("pax-phone").value.trim();
  var pickup = document.getElementById("pax-from").value.trim();
  var dropoff = document.getElementById("pax-to").value.trim();
  var seats = parseInt(document.getElementById("pax-seats").value) || 1;
  if (!name || !phone) return;

  var { data, error } = await sb.from("bookings").insert({
    route_id: paxRouteId,
    passenger_name: name,
    phone: phone,
    pickup_point: pickup,
    dropoff_point: dropoff,
    seats_count: seats
  }).select();

  if (error) { alert("Error: " + error.message); return; }
  paxBookings.push(data[0]);

  // Update booking counts
  bookingCounts[paxRouteId] = (bookingCounts[paxRouteId] || 0) + seats;
  renderTable();

  // Clear form
  document.getElementById("pax-name").value = "";
  document.getElementById("pax-phone").value = "";
  document.getElementById("pax-from").value = "";
  document.getElementById("pax-to").value = "";
  document.getElementById("pax-seats").value = "1";

  var trip = trips.find(function(t) { return t.id === paxRouteId; });
  renderPaxList(trip);
}

async function deletePax(bookingId) {
  var booking = paxBookings.find(function(b) { return b.id === bookingId; });
  var { error } = await sb.from("bookings").delete().eq("id", bookingId);
  if (error) { alert("Error: " + error.message); return; }
  paxBookings = paxBookings.filter(function(b) { return b.id !== bookingId; });

  // Update booking counts
  if (booking) {
    bookingCounts[paxRouteId] = Math.max(0, (bookingCounts[paxRouteId] || 0) - (booking.seats_count || 1));
  }
  renderTable();

  var trip = trips.find(function(t) { return t.id === paxRouteId; });
  renderPaxList(trip);
}

// ==================== Init ====================
applyTranslations();
// Init language-dependent links
document.querySelectorAll("[data-lang-href]").forEach(function(el) {
  el.href = el.getAttribute("data-lang-href").replace("{lang}", currentLang);
});
setupAC("f-from", "ac-from", false);
setupAC("f-to", "ac-to", false);
setupAC("f-waypoints", "ac-wp", true);

// Filtered loaders for dispatcher
async function sbLoadTripsFiltered() {
  if (dispatcherInfo && dispatcherInfo.allIds && dispatcherInfo.allIds.length > 0) {
    var { data, error } = await sb.from("routes").select("*").in("carrier_id", dispatcherInfo.allIds).order("created_at");
    if (error) { console.error("Load error:", error); return []; }
    return data.map(dbToTrip);
  }
  return sbLoadTrips();
}

async function sbLoadBookingCountsFiltered() {
  if (dispatcherInfo && dispatcherInfo.allIds && dispatcherInfo.allIds.length > 0) {
    // Use already loaded trips to get route IDs
    var routeIds = trips.map(function(t) { return t.id; });
    if (routeIds.length === 0) return {};
    var { data, error } = await sb.from("bookings").select("route_id,seats_count").in("route_id", routeIds);
    if (error) { console.error("Bookings error:", error); return {}; }
    var map = {};
    (data || []).forEach(function(b) { map[b.route_id] = (map[b.route_id] || 0) + b.seats_count; });
    return map;
  }
  return sbLoadBookingCounts();
}

function onDriverSelect() {
  var sel = document.getElementById("f-driver-select");
  var opt = sel.options[sel.selectedIndex];
  if (opt) {
    document.getElementById("f-carrier").value = opt.textContent;
    document.getElementById("f-carrier-id").value = opt.value;
    if (dispatcherInfo && dispatcherInfo.driverPhones) {
      document.getElementById("f-phone").value = dispatcherInfo.driverPhones[opt.value] || "";
    }
  }
}

async function initDispatcherPage() {
  // Show dispatcher bar
  var bar = document.getElementById("dispatcher-bar");
  if (bar && dispatcherInfo) {
    bar.style.display = "flex";
    document.getElementById("dispatcher-name").textContent = dispatcherInfo.name;
    document.getElementById("dispatcher-company").textContent = dispatcherInfo.companyId;
  }

  // Show driver selector, hide carrier text inputs
  if (dispatcherInfo && dispatcherInfo.driverIds && dispatcherInfo.driverIds.length > 0) {
    var selectEl = document.getElementById("f-driver-select");
    selectEl.innerHTML = "";
    dispatcherInfo.driverIds.forEach(function(id) {
      var name = dispatcherInfo.driverNames[id] || id;
      var opt = document.createElement("option");
      opt.value = id;
      opt.textContent = name;
      selectEl.appendChild(opt);
    });
    document.getElementById("driver-select-wrap").style.display = "";
    document.getElementById("carrier-wrap").style.display = "none";
    document.getElementById("carrier-id-wrap").style.display = "none";
    // Pre-fill carrier fields
    onDriverSelect();
  }

  // Load filtered data (trips first, then bookings which depend on trips)
  trips = await sbLoadTripsFiltered();
  bookingCounts = await sbLoadBookingCountsFiltered();
  renderTable();
}

// Start the page if already logged in
if (dispatcherInfo) {
  initDispatcherPage();
}
